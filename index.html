<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maya Modern Map</title>

  <!-- Leaflet core CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <!-- Leaflet.markercluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --gold: #e2b96f;
      --gold-soft: #f3d699;
      --panel-bg: #ffffff;
      --chip-bg: #eeeeee;
      --chip-bg-hover: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --popup-bg: #16213e;
      --map-bg: #0e1424;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--map-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      height: 100%;
      width: 100%;
      background: var(--map-bg);
    }

    .leaflet-container {
      background: var(--map-bg);
      font-family: inherit;
    }

    /* ---------- Loading indicator ---------- */
    .map-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      background: var(--panel-bg);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    /* ---------- Floating panel (top-left) ---------- */
    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 650;
      width: 300px;
      background: var(--panel-bg);
      color: var(--text);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-header {
      height: 14px;
      user-select: none;
      margin: -6px -4px 2px;
      border-radius: 10px;
      position: relative;
    }

    .panel-header::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 4px;
      border-radius: 4px;
      background: #d1d5db;
    }

    .panel-placeholder {
      font-size: 12px;
      color: var(--muted-2);
      font-style: italic;
      padding: 8px 4px;
      text-align: center;
    }

    .count-label {
      font-size: 11.5px;
      color: var(--muted-2);
      padding: 0 4px;
      letter-spacing: 0.2px;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Leaflet zoom control restyled ---------- */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
      border-radius: 10px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: var(--panel-bg) !important;
      color: var(--text) !important;
      border: none !important;
      border-bottom: 1px solid #eeeeee !important;
      transition: background 0.15s ease;
    }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-zoom a:hover { background: #f5f5f5 !important; }
    .leaflet-bar { border: none !important; }

    /* ---------- Attribution ---------- */
    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
      font-size: 10.5px;
      border-radius: 6px;
      margin: 0 8px 8px 0 !important;
      padding: 2px 8px;
    }
    .leaflet-control-attribution a { color: var(--text) !important; }

    /* ---------- Dark themed popups ---------- */
    .leaflet-popup-content-wrapper {
      background: var(--popup-bg) !important;
      color: #e8ecf4 !important;
      border-radius: 14px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45) !important;
      border: 1px solid rgba(226, 185, 111, 0.25);
      padding: 4px;
    }
    .leaflet-popup-content {
      margin: 14px 16px !important;
      line-height: 1.5;
      font-size: 13px;
      min-width: 220px;
    }
    .leaflet-popup-tip {
      background: var(--popup-bg) !important;
      border: 1px solid rgba(226, 185, 111, 0.25);
    }
    .leaflet-popup-close-button {
      color: #8a93a8 !important;
      font-size: 20px !important;
      padding: 8px 10px 0 0 !important;
    }
    .leaflet-popup-close-button:hover { color: var(--gold) !important; }

    .popup-title {
      color: var(--gold);
      font-weight: 700;
      font-size: 15px;
      margin: 0 0 4px 0;
    }
    .popup-sub {
      color: #8a93a8;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .popup-sub .sep { margin: 0 6px; opacity: 0.45; }
    .popup-rank {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(226, 185, 111, 0.18);
      color: var(--gold);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .popup-rank .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* ---------- Marker clusters ---------- */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large,
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      background: transparent !important;
    }
    .marker-cluster {
      background: rgba(226, 185, 111, 0.35);
      border: 2px solid rgba(226, 185, 111, 0.8);
      color: #1a1a1a;
      font-weight: 700;
      border-radius: 50%;
    }
    .marker-cluster div {
      background: rgba(226, 185, 111, 0.6);
      color: #1a1a1a;
      font-weight: 700;
    }

    /* ---------- Bottom-right control stack ---------- */
    .map-controls-br {
      position: absolute;
      bottom: 30px;
      right: 10px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .map-icon-btn {
      width: 38px;
      height: 38px;
      background: #ffffff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease, color 0.15s ease;
    }
    .map-icon-btn:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
    }
    .map-icon-btn.active {
      background: var(--gold);
      color: #1a1a1a;
    }
    .map-icon-btn svg {
      width: 19px;
      height: 19px;
      display: block;
    }
    .map-icon-btn.loading svg {
      animation: locspin 0.9s linear infinite;
    }
    @keyframes locspin {
      to { transform: rotate(360deg); }
    }

    .layers-wrap {
      position: relative;
      display: flex;
    }

    /* ---------- Basemap popover ---------- */
    .basemap-popover {
      position: absolute;
      right: 0;
      bottom: calc(100% + 8px);
      width: 222px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(6px) scale(0.98);
      transform-origin: bottom right;
      transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
    }
    .basemap-popover.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .bm-option {
      display: flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      transition: background 0.14s ease;
    }
    .bm-option:hover { background: var(--chip-bg); }
    .bm-option .bm-check {
      flex: 0 0 16px;
      width: 16px;
      height: 16px;
      color: var(--gold);
      opacity: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .bm-option .bm-check svg { width: 16px; height: 16px; }
    .bm-option.active .bm-check { opacity: 1; }
    .bm-option .bm-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .bm-option .bm-name {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .bm-option.active .bm-name {
      color: #b07d2a;
      font-weight: 600;
    }
    .bm-option .bm-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.2;
      font-style: italic;
    }

    /* ---------- User location marker (Google-Maps-style pulsing dot) ---------- */
    .user-loc-icon {
      background: transparent;
      border: none;
    }
    .user-loc-dot {
      position: relative;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4285F4;
      border: 3px solid #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      z-index: 1;
    }
    .user-loc-dot::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(66, 133, 244, 0.35);
      transform: translate(-50%, -50%);
      z-index: -1;
      animation: locpulse 2s ease-out infinite;
    }
    @keyframes locpulse {
      0%   { width: 16px; height: 16px; opacity: 0.6; }
      100% { width: 56px; height: 56px; opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div class="map-loading" id="loadingIndicator">Loading Maya sites...</div>

  <!-- Floating panel (top-left) -->
  <div class="panel" id="panel">
    <div class="panel-header" aria-label="Panel"></div>
    <div class="count-label" id="countLabel">Loading sites...</div>
    <div class="panel-placeholder">Search, filters and site list coming next</div>
  </div>

  <!-- Bottom-right control stack -->
  <div class="map-controls-br">
    <button class="map-icon-btn" id="locateBtn" type="button" title="Find my location" aria-label="Find my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="7"></circle>
        <line x1="12" y1="1" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="23"></line>
        <line x1="1" y1="12" x2="4" y2="12"></line>
        <line x1="20" y1="12" x2="23" y2="12"></line>
        <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"></circle>
      </svg>
    </button>
    <div class="layers-wrap">
      <button class="map-icon-btn" id="layersBtn" type="button" title="Basemaps" aria-label="Choose basemap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
      </button>
      <div class="basemap-popover" id="basemapPopover"></div>
    </div>
  </div>

  <!-- Leaflet core JavaScript -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script>
    // ── Initialise the map ─────────────────────────────────────────────────
    const map = L.map('map', {
      center: [16.5, -89.5],
      zoom: 6,
      minZoom: 3,
      maxZoom: 18,
      zoomControl: true,
    });

    // ── Define the four basemaps ──────────────────────────────────────────
    const basemaps = {
      "OpenStreetMap": L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap contributors" }
      ),
      "Esri Topo": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      ),
      "Dark": L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap, &copy; CARTO" }
      ),
      "Satellite": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      )
    };

    let activeBasemap = basemaps["OpenStreetMap"];
    activeBasemap.addTo(map);
    let activeBasemapName = "OpenStreetMap";

    const basemapMeta = [
      { name: "OpenStreetMap", sub: "Standard street map" },
      { name: "Esri Topo",     sub: "Terrain & topography" },
      { name: "Dark",          sub: "Muted dark canvas" },
      { name: "Satellite",     sub: "Aerial imagery" }
    ];
    const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    const basemapPopover = document.getElementById("basemapPopover");
    const layersBtn = document.getElementById("layersBtn");

    function renderBasemapOptions() {
      basemapPopover.querySelectorAll(".bm-option").forEach((el) => el.remove());
      basemapMeta.forEach(({ name, sub }) => {
        const opt = document.createElement("button");
        opt.type = "button";
        opt.className = "bm-option" + (name === activeBasemapName ? " active" : "");
        opt.innerHTML =
          `<span class="bm-check">${CHECK_SVG}</span>` +
          `<span class="bm-text"><span class="bm-name">${name}</span><span class="bm-sub">${sub}</span></span>`;
        opt.addEventListener("click", () => {
          if (name !== activeBasemapName) {
            map.removeLayer(activeBasemap);
            activeBasemap = basemaps[name];
            activeBasemap.addTo(map);
            activeBasemapName = name;
            renderBasemapOptions();
          }
          closeBasemapPopover();
        });
        basemapPopover.appendChild(opt);
      });
    }

    function openBasemapPopover() {
      basemapPopover.classList.add("open");
      layersBtn.classList.add("active");
    }
    function closeBasemapPopover() {
      basemapPopover.classList.remove("open");
      layersBtn.classList.remove("active");
    }

    layersBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (basemapPopover.classList.contains("open")) {
        closeBasemapPopover();
      } else {
        openBasemapPopover();
      }
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".layers-wrap")) closeBasemapPopover();
    });

    renderBasemapOptions();

    // ── Find my location ──────────────────────────────────────────────────
    const locateBtn = document.getElementById("locateBtn");
    let locationMarker = null;

    locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        alert("Your browser does not support geolocation.");
        return;
      }
      locateBtn.classList.add("loading");
      map.locate({ setView: false, enableHighAccuracy: true, timeout: 10000 });
    });

    map.on("locationfound", (e) => {
      locateBtn.classList.remove("loading");
      if (locationMarker) map.removeLayer(locationMarker);
      const icon = L.divIcon({
        className: "user-loc-icon",
        html: '<div class="user-loc-dot"></div>',
        iconSize: [16, 16],
        iconAnchor: [8, 8]
      });
      locationMarker = L.marker(e.latlng, { icon, zIndexOffset: 1000 }).addTo(map);
      locationMarker.bindPopup(
        '<div class="popup-title" style="margin:0">You are here</div>',
        { maxWidth: 200 }
      ).openPopup();
      map.flyTo(e.latlng, Math.max(map.getZoom(), 10), { duration: 1.2 });
    });

    map.on("locationerror", () => {
      locateBtn.classList.remove("loading");
      alert("Unable to find your location. Please allow location access in your browser.");
    });

    // ── Rank labels (used in site popups) ─────────────────────────────────
    const RANK_LABELS = {
      1: 'Major centre',
      2: 'Important site',
      3: 'Medium site',
      4: 'Minor site',
      5: 'Minimal remains',
    };

    function buildPopup(properties) {
      const name = properties.name || 'Unnamed site';
      const country = properties.country || '';
      const state = properties.state || '';
      const rank = properties.rank;
      const rankLabel = RANK_LABELS[rank] || (rank ? `Rank ${rank}` : null);

      const subParts = [country, state].filter(Boolean);
      const subLine = subParts.length > 0
        ? `<div class="popup-sub">${subParts.join('<span class="sep">·</span>')}</div>`
        : '';

      const rankBadge = rankLabel
        ? `<div class="popup-rank"><span class="dot"></span>${rankLabel}</div>`
        : '';

      return `
        <div class="popup-title">${name}</div>
        ${subLine}
        ${rankBadge}
      `;
    }

    function createMarker(feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 5,
        fillColor: '#e2b96f',
        color: '#ffffff',
        weight: 1.2,
        opacity: 1,
        fillOpacity: 0.9,
      });
    }

    const markerCluster = L.markerClusterGroup({
      disableClusteringAtZoom: 12,
      spiderfyOnMaxZoom: false,
      showCoverageOnHover: false,
      chunkedLoading: true,
    });

    fetch('data/maya_sites.geojson')
      .then(response => {
        if (!response.ok) throw new Error(`Failed to load GeoJSON: ${response.status}`);
        return response.json();
      })
      .then(geojson => {
        const featureLayer = L.geoJSON(geojson, {
          pointToLayer: createMarker,
          onEachFeature: (feature, layer) => {
            layer.bindPopup(buildPopup(feature.properties));
          },
        });
        markerCluster.addLayer(featureLayer);
        map.addLayer(markerCluster);

        const count = geojson.features.length;
        document.getElementById('countLabel').textContent =
          count.toLocaleString() + ' Maya sites';

        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.style.transition = 'opacity 0.3s ease';
          loading.style.opacity = '0';
          setTimeout(() => loading.remove(), 300);
        }
      })
      .catch(error => {
        console.error('Error loading Maya sites:', error);
        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.textContent = 'Error loading site data. Please try refreshing.';
          loading.style.background = '#fce4e4';
          loading.style.color = '#c0392b';
        }
      });
  </script>
</body>
</html>
