<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maya Modern Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <style>
    :root {
      --gold: #e2b96f;
      --gold-soft: #f3d699;
      --panel-bg: #ffffff;
      --chip-bg: #eeeeee;
      --chip-bg-hover: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --popup-bg: #16213e;
      --map-bg: #0e1424;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%; margin: 0; padding: 0; width: 100%;
      background: var(--map-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #map { position: absolute; inset: 0; height: 100%; width: 100%; background: var(--map-bg); }
    .leaflet-container { background: var(--map-bg); font-family: inherit; }
    .leaflet-container.radius-active { cursor: crosshair; }

    .map-loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      background: var(--panel-bg);
      padding: 1rem 1.5rem; border-radius: 12px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      font-weight: 500;
    }

    /* ---------- Site labels on the map ---------- */
    .leaflet-labels-pane { pointer-events: none; }

    .site-label {
      background: transparent !important;
      border: none !important;
    }
    .site-label-inner {
      display: inline-block;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 600;
      color: #1a1a1a;
      padding: 1px 5px;
      border-radius: 4px;
      text-shadow:
        -1px -1px 0 #ffffff,
         1px -1px 0 #ffffff,
        -1px  1px 0 #ffffff,
         1px  1px 0 #ffffff,
         0 0 3px rgba(255, 255, 255, 0.9);
      pointer-events: none;
      transform: translateX(8px);
      letter-spacing: 0.1px;
    }
    .site-label-inner.rank-1 { font-size: 13px; font-weight: 700; }
    .site-label-inner.rank-2 { font-size: 12px; font-weight: 700; }
    .site-label-inner.rank-3 { font-size: 11.5px; }
    .site-label-inner.rank-4 { font-size: 10.5px; color: #333; }
    .site-label-inner.rank-5 { font-size: 10.5px; color: #333; }

    /* ---------- Floating panel ---------- */
    .panel {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 650;
      width: 300px;
      background: var(--panel-bg);
      color: var(--text);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .panel.dragging {
      transition: none;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25);
    }

    .panel-header {
      height: 14px;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      margin: -6px -4px 2px;
      border-radius: 10px;
      position: relative;
      transition: background 0.15s ease;
    }
    .panel-header::before {
      content: "";
      position: absolute;
      top: 4px; left: 50%;
      transform: translateX(-50%);
      width: 36px; height: 4px;
      border-radius: 4px;
      background: #d1d5db;
      transition: background 0.15s ease;
    }
    .panel-header:hover::before { background: #b0b5c0; }
    .panel.dragging .panel-header,
    .panel-header:active { cursor: grabbing; }
    .panel.dragging .panel-header::before { background: var(--gold); }

    .search-row { display: flex; gap: 8px; align-items: stretch; }
    .search-row .search-wrap { flex: 1; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%;
      background: var(--chip-bg);
      border: none; outline: none;
      border-radius: 12px;
      padding: 10px 14px 10px 34px;
      font-size: 12px; color: var(--text);
      font-family: inherit;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .search-input::placeholder { color: #9ca3af; }
    .search-input:focus {
      background: var(--chip-bg-hover);
      box-shadow: 0 0 0 3px rgba(226, 185, 111, 0.25);
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #9ca3af; pointer-events: none;
      width: 14px; height: 14px;
    }

    .radius-btn {
      flex: 0 0 auto;
      background: var(--chip-bg);
      border: none; border-radius: 12px;
      padding: 0 14px;
      font-size: 12.5px; font-weight: 500;
      color: var(--text); cursor: pointer;
      font-family: inherit; white-space: nowrap;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .radius-btn:hover { background: var(--chip-bg-hover); }
    .radius-btn.active { background: var(--gold); color: #1a1a1a; }

    .radius-control {
      display: none; flex-direction: column; gap: 8px;
      background: var(--chip-bg); border-radius: 12px; padding: 12px;
    }
    .radius-control.open { display: flex; }
    .radius-control .rc-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--text); font-weight: 500; }
    .radius-control .rc-km { color: #b07d2a; font-variant-numeric: tabular-nums; font-weight: 700; }
    .radius-control input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }
    .radius-control .rc-readout { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .radius-control .rc-readout strong { color: #1a1a1a; }
    .radius-control .rc-hint { font-size: 11px; color: var(--muted-2); font-style: italic; }

    .count-label {
      font-size: 11.5px; color: var(--muted-2);
      padding: 0 4px;
      letter-spacing: 0.2px;
      font-variant-numeric: tabular-nums;
    }

    .rank-filter { display: flex; gap: 5px; }
    .rank-pill {
      flex: 1;
      background: var(--chip-bg);
      border: none; border-radius: 999px;
      padding: 5px 2px;
      font-size: 10.5px; font-weight: 500;
      color: var(--text);
      cursor: pointer; font-family: inherit;
      transition: background 0.16s ease, color 0.16s ease;
      white-space: nowrap; text-align: center;
    }
    .rank-pill:hover { background: var(--chip-bg-hover); }
    .rank-pill.active { background: var(--gold); color: #1a1a1a; }

    .site-list-wrap { overflow: hidden; }
    .site-list {
      max-height: 280px;
      overflow-y: auto;
      margin: 0; padding: 0 2px 0 0;
      list-style: none;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }
    .site-list::-webkit-scrollbar { width: 6px; }
    .site-list::-webkit-scrollbar-track { background: transparent; }
    .site-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
    .site-list::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    .site-item {
      padding: 8px 12px; margin: 2px 0;
      border-radius: 10px; cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      display: flex; flex-direction: column; gap: 2px;
      user-select: none;
    }
    .site-item:hover { background: var(--chip-bg); }
    .site-item.active { background: var(--gold); color: var(--text); }
    .site-item.active .site-meta { color: rgba(26, 26, 26, 0.72); }
    .site-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.25; }
    .site-meta { font-size: 11px; color: var(--muted); line-height: 1.2; }
    .empty {
      padding: 16px 12px; color: var(--muted);
      font-size: 13px; text-align: center; font-style: italic;
    }

    .view-toggle {
      position: absolute;
      bottom: 30px; left: 16px;
      z-index: 1000;
      display: flex; gap: 6px;
    }
    .view-pill {
      background: #ffffff;
      color: #1a1a1a;
      border: none; border-radius: 10px;
      padding: 6px 12px;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      transition: background 0.18s ease, color 0.18s ease, transform 0.15s ease;
      white-space: nowrap;
    }
    .view-pill:hover { background: #f5f5f5; transform: translateY(-1px); }
    .view-pill.active { background: var(--gold); color: #1a1a1a; }
    .view-pill.active:hover { background: var(--gold); }

    .bubble-cluster-wrap { background: transparent !important; border: none !important; }
    .bubble-cluster {
      background: rgba(220, 80, 60, 0.5);
      border: 2px solid rgba(220, 80, 60, 0.9);
      color: #ffffff; font-weight: 700; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-variant-numeric: tabular-nums;
    }
    .bubble-cluster:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(220, 80, 60, 0.35); }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
      border-radius: 10px !important; overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: var(--panel-bg) !important;
      color: var(--text) !important;
      border: none !important;
      border-bottom: 1px solid #eeeeee !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-zoom a:hover { background: #f5f5f5 !important; }
    .leaflet-bar { border: none !important; }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
      font-size: 10.5px; border-radius: 6px;
      margin: 0 8px 8px 0 !important; padding: 2px 8px;
    }
    .leaflet-control-attribution a { color: var(--text) !important; }

    .leaflet-popup-content-wrapper {
      background: var(--popup-bg) !important;
      color: #e8ecf4 !important;
      border-radius: 14px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45) !important;
      border: 1px solid rgba(226, 185, 111, 0.25);
      padding: 4px;
    }
    .leaflet-popup-content { margin: 14px 16px !important; line-height: 1.5; font-size: 13px; min-width: 220px; }
    .leaflet-popup-tip { background: var(--popup-bg) !important; border: 1px solid rgba(226, 185, 111, 0.25); }
    .leaflet-popup-close-button { color: #8a93a8 !important; font-size: 20px !important; padding: 8px 10px 0 0 !important; }
    .leaflet-popup-close-button:hover { color: var(--gold) !important; }

    .popup-title { color: var(--gold); font-weight: 700; font-size: 15px; margin: 0 0 4px 0; }
    .popup-sub { color: #8a93a8; font-size: 11px; text-transform: uppercase; letter-spacing: 1.1px; margin-bottom: 8px; font-weight: 600; }
    .popup-sub .sep { margin: 0 6px; opacity: 0.45; }
    .popup-rank {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(226, 185, 111, 0.18);
      color: var(--gold); border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .popup-rank .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large,
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div { background: transparent !important; }
    .marker-cluster {
      background: rgba(226, 185, 111, 0.35);
      border: 2px solid rgba(226, 185, 111, 0.8);
      color: #1a1a1a; font-weight: 700; border-radius: 50%;
    }
    .marker-cluster div {
      background: rgba(226, 185, 111, 0.6);
      color: #1a1a1a; font-weight: 700;
    }

    .map-controls-br {
      position: absolute; bottom: 30px; right: 10px;
      z-index: 1000;
      display: flex; flex-direction: column;
      gap: 8px; align-items: flex-end;
    }
    .map-icon-btn {
      width: 38px; height: 38px;
      background: #ffffff; color: #1a1a1a;
      border: none; border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease, color 0.15s ease;
    }
    .map-icon-btn:hover { background: #f5f5f5; transform: translateY(-1px); }
    .map-icon-btn.active { background: var(--gold); color: #1a1a1a; }
    .map-icon-btn svg { width: 19px; height: 19px; display: block; }
    .map-icon-btn.loading svg { animation: locspin 0.9s linear infinite; }
    @keyframes locspin { to { transform: rotate(360deg); } }

    .layers-wrap { position: relative; display: flex; }

    .basemap-popover {
      position: absolute; right: 0;
      bottom: calc(100% + 8px);
      width: 222px;
      background: #ffffff; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
      padding: 6px;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; visibility: hidden;
      transform: translateY(6px) scale(0.98);
      transform-origin: bottom right;
      transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
    }
    .basemap-popover.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    .bm-option {
      display: flex; align-items: center; gap: 9px;
      background: transparent; border: none; border-radius: 8px;
      padding: 8px 10px; cursor: pointer; font-family: inherit;
      text-align: left; transition: background 0.14s ease;
    }
    .bm-option:hover { background: var(--chip-bg); }
    .bm-option .bm-check { flex: 0 0 16px; width: 16px; height: 16px; color: var(--gold); opacity: 0; display: inline-flex; align-items: center; justify-content: center; }
    .bm-option .bm-check svg { width: 16px; height: 16px; }
    .bm-option.active .bm-check { opacity: 1; }
    .bm-option .bm-text { display: flex; flex-direction: column; gap: 1px; }
    .bm-option .bm-name { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.2; }
    .bm-option.active .bm-name { color: #b07d2a; font-weight: 600; }
    .bm-option .bm-sub { font-size: 11px; color: var(--muted); line-height: 1.2; font-style: italic; }

    .user-loc-icon { background: transparent; border: none; }
    .user-loc-dot {
      position: relative; width: 16px; height: 16px;
      border-radius: 50%; background: #4285F4;
      border: 3px solid #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      z-index: 1;
    }
    .user-loc-dot::before {
      content: ""; position: absolute; left: 50%; top: 50%;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(66, 133, 244, 0.35);
      transform: translate(-50%, -50%);
      z-index: -1; animation: locpulse 2s ease-out infinite;
    }
    @keyframes locpulse {
      0% { width: 16px; height: 16px; opacity: 0.6; }
      100% { width: 56px; height: 56px; opacity: 0; }
    }

    .details-tab {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      background: var(--gold);
      color: #1a1a1a;
      border: none; cursor: pointer;
      padding: 16px 8px;
      border-radius: 10px 0 0 10px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 12px; font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      box-shadow: -2px 4px 12px rgba(0, 0, 0, 0.18);
      transition: background 0.16s ease, padding 0.16s ease;
      font-family: inherit;
    }
    .details-tab:hover { background: var(--gold-soft); padding-right: 12px; }
    .details-tab.hidden { display: none; }

    .analytics-panel {
      position: absolute; top: 0; right: 0;
      height: 100%; width: 450px; max-width: 92vw;
      background: var(--panel-bg); color: var(--text);
      z-index: 1100;
      box-shadow: -6px 0 24px rgba(0, 0, 0, 0.18);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    .analytics-panel.open { transform: translateX(0); }

    .ap-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .ap-title { display: flex; flex-direction: column; gap: 4px; }
    .ap-title .ap-eyebrow {
      font-size: 10.5px; font-weight: 600;
      color: var(--muted-2);
      letter-spacing: 1.3px;
      text-transform: uppercase;
    }
    .ap-title h2 {
      margin: 0; font-size: 20px; font-weight: 700;
      color: #1a1a1a; letter-spacing: -0.2px;
    }
    .ap-close {
      background: transparent; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px; border-radius: 8px;
      transition: background 0.14s ease, color 0.14s ease;
      line-height: 0;
    }
    .ap-close:hover { background: var(--chip-bg); color: #1a1a1a; }
    .ap-close svg { width: 20px; height: 20px; }

    .ap-scroll {
      overflow-y: auto; padding: 18px 22px 24px;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }
    .ap-scroll::-webkit-scrollbar { width: 6px; }
    .ap-scroll::-webkit-scrollbar-track { background: transparent; }
    .ap-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }

    .ap-summary {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 22px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(226,185,111,0.18) 0%, rgba(226,185,111,0.06) 100%);
      border-radius: 12px;
    }
    .ap-summary .ap-summary-count {
      font-size: 28px; font-weight: 800;
      color: #1a1a1a;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px; line-height: 1;
    }
    .ap-summary .ap-summary-label {
      font-size: 13px; color: var(--muted); font-weight: 500;
    }

    .ap-section { margin-bottom: 26px; }
    .ap-section:last-child { margin-bottom: 8px; }
    .ap-section-title {
      font-size: 12px; font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin: 0 0 12px 0;
    }
    .ap-chart-wrap {
      background: #fafafa;
      border-radius: 12px;
      padding: 14px;
      height: 210px;
      position: relative;
    }
    .ap-chart-wrap.tall { height: 250px; }
  </style>
</head>
<body>

  <div id="map"></div>
  <div class="map-loading" id="loadingIndicator">Loading Maya sites...</div>

  <div class="panel" id="panel">
    <div class="panel-header" aria-label="Drag to move"></div>

    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search" class="search-input" type="text" placeholder="Search sites..." autocomplete="off" spellcheck="false">
      </div>
      <button class="radius-btn" id="radiusBtn" type="button">Radius</button>
    </div>

    <div class="count-label" id="countLabel">Loading sites...</div>

    <div class="rank-filter" id="rankFilter" role="group" aria-label="Filter by significance">
      <button class="rank-pill" type="button" data-rank="1">Major</button>
      <button class="rank-pill" type="button" data-rank="2">Important</button>
      <button class="rank-pill" type="button" data-rank="3">Medium</button>
      <button class="rank-pill" type="button" data-rank="4">Minor</button>
    </div>

    <div class="radius-control" id="radiusControl">
      <div class="rc-top">
        <span>Radius</span>
        <span class="rc-km" id="rcKm">50 km</span>
      </div>
      <input type="range" id="rcSlider" min="10" max="500" step="5" value="50">
      <div class="rc-readout" id="rcReadout"><strong>0</strong> sites within 50 km</div>
      <div class="rc-hint" id="rcHint">Click anywhere on the map to set a centre.</div>
    </div>

    <div class="site-list-wrap">
      <ul class="site-list" id="siteList"></ul>
    </div>
  </div>

  <div class="view-toggle" role="tablist" aria-label="View mode">
    <button class="view-pill active" id="viewPoints" type="button" data-view="points">Points</button>
    <button class="view-pill" id="viewBubbles" type="button" data-view="bubbles">Bubbles</button>
    <button class="view-pill" id="viewHeat" type="button" data-view="heat">Heat</button>
  </div>

  <button class="details-tab" id="detailsTab" type="button" aria-label="Open analytics panel">Details</button>

  <aside class="analytics-panel" id="analyticsPanel" aria-hidden="true">
    <div class="ap-header">
      <div class="ap-title">
        <span class="ap-eyebrow">Overview</span>
        <h2>Analytics</h2>
      </div>
      <button class="ap-close" id="apClose" type="button" aria-label="Close analytics panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="ap-scroll">
      <div class="ap-summary">
        <div class="ap-summary-count" id="apCount">0</div>
        <div class="ap-summary-label">sites in current view</div>
      </div>

      <div class="ap-section">
        <h3 class="ap-section-title">By country</h3>
        <div class="ap-chart-wrap"><canvas id="chartCountry"></canvas></div>
      </div>

      <div class="ap-section">
        <h3 class="ap-section-title">By state / region</h3>
        <div class="ap-chart-wrap tall"><canvas id="chartStates"></canvas></div>
      </div>

      <div class="ap-section">
        <h3 class="ap-section-title">By archaeological rank</h3>
        <div class="ap-chart-wrap"><canvas id="chartRank"></canvas></div>
      </div>
    </div>
  </aside>

  <div class="map-controls-br">
    <button class="map-icon-btn" id="locateBtn" type="button" title="Find my location" aria-label="Find my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="7"></circle>
        <line x1="12" y1="1" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="23"></line>
        <line x1="1" y1="12" x2="4" y2="12"></line>
        <line x1="20" y1="12" x2="23" y2="12"></line>
        <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"></circle>
      </svg>
    </button>
    <div class="layers-wrap">
      <button class="map-icon-btn" id="layersBtn" type="button" title="Basemaps" aria-label="Choose basemap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
      </button>
      <div class="basemap-popover" id="basemapPopover"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

  <script>
    // ── Initialise the map ─────────────────────────────────────────────────
    const map = L.map('map', {
      center: [16.5, -89.5],
      zoom: 6, minZoom: 3, maxZoom: 18,
      zoomControl: true,
    });

    map.createPane('labelsPane');
    map.getPane('labelsPane').style.zIndex = 640;
    map.getPane('labelsPane').classList.add('leaflet-labels-pane');

    // ── Basemaps ──────────────────────────────────────────────────────────
    const basemaps = {
      "OpenStreetMap": L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap contributors" }
      ),
      "Esri Topo": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      ),
      "Dark": L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap, &copy; CARTO" }
      ),
      "Satellite": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      )
    };
    let activeBasemap = basemaps["OpenStreetMap"];
    activeBasemap.addTo(map);
    let activeBasemapName = "OpenStreetMap";

    const basemapMeta = [
      { name: "OpenStreetMap", sub: "Standard street map" },
      { name: "Esri Topo",     sub: "Terrain & topography" },
      { name: "Dark",          sub: "Muted dark canvas" },
      { name: "Satellite",     sub: "Aerial imagery" }
    ];
    const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    const basemapPopover = document.getElementById("basemapPopover");
    const layersBtn = document.getElementById("layersBtn");

    function renderBasemapOptions() {
      basemapPopover.querySelectorAll(".bm-option").forEach((el) => el.remove());
      basemapMeta.forEach(({ name, sub }) => {
        const opt = document.createElement("button");
        opt.type = "button";
        opt.className = "bm-option" + (name === activeBasemapName ? " active" : "");
        opt.innerHTML = `<span class="bm-check">${CHECK_SVG}</span><span class="bm-text"><span class="bm-name">${name}</span><span class="bm-sub">${sub}</span></span>`;
        opt.addEventListener("click", () => {
          if (name !== activeBasemapName) {
            map.removeLayer(activeBasemap);
            activeBasemap = basemaps[name];
            activeBasemap.addTo(map);
            activeBasemapName = name;
            renderBasemapOptions();
          }
          closeBasemapPopover();
        });
        basemapPopover.appendChild(opt);
      });
    }
    function openBasemapPopover() { basemapPopover.classList.add("open"); layersBtn.classList.add("active"); }
    function closeBasemapPopover() { basemapPopover.classList.remove("open"); layersBtn.classList.remove("active"); }
    layersBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (basemapPopover.classList.contains("open")) closeBasemapPopover();
      else openBasemapPopover();
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".layers-wrap")) closeBasemapPopover();
    });
    renderBasemapOptions();

    // ── Find my location ──────────────────────────────────────────────────
    const locateBtn = document.getElementById("locateBtn");
    let locationMarker = null;

    locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) { alert("Your browser does not support geolocation."); return; }
      locateBtn.classList.add("loading");
      map.locate({ setView: false, enableHighAccuracy: true, timeout: 10000 });
    });
    map.on("locationfound", (e) => {
      locateBtn.classList.remove("loading");
      if (locationMarker) map.removeLayer(locationMarker);
      const icon = L.divIcon({
        className: "user-loc-icon",
        html: '<div class="user-loc-dot"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8]
      });
      locationMarker = L.marker(e.latlng, { icon, zIndexOffset: 1000 }).addTo(map);
      locationMarker.bindPopup('<div class="popup-title" style="margin:0">You are here</div>', { maxWidth: 200 }).openPopup();
      map.flyTo(e.latlng, Math.max(map.getZoom(), 10), { duration: 1.2 });
    });
    map.on("locationerror", () => {
      locateBtn.classList.remove("loading");
      alert("Unable to find your location. Please allow location access in your browser.");
    });

    // ── Rank labels + popups ──────────────────────────────────────────────
    const RANK_LABELS = {
      1: 'Major centre', 2: 'Important site', 3: 'Medium site', 4: 'Minor site', 5: 'Minimal remains',
    };

    function buildPopup(properties) {
      const name = properties.name || 'Unnamed site';
      const country = properties.country || '';
      const state = properties.state || '';
      const rank = properties.rank;
      const rankLabel = RANK_LABELS[rank] || (rank ? `Rank ${rank}` : null);
      const subParts = [country, state].filter(Boolean);
      const subLine = subParts.length > 0
        ? `<div class="popup-sub">${subParts.join('<span class="sep">·</span>')}</div>` : '';
      const rankBadge = rankLabel
        ? `<div class="popup-rank"><span class="dot"></span>${rankLabel}</div>` : '';
      return `<div class="popup-title">${name}</div>${subLine}${rankBadge}`;
    }

    // ── Site state ────────────────────────────────────────────────────────
    let allSites = [];
    let currentFiltered = [];
    let searchQuery = "";
    let activeRankMax = Infinity;
    let activeIdx = null;
    let currentView = "points";
    let radiusToolActive = false;
    let radiusFilter = null;
    let radiusCircle = null;

    const pointMarkerByIdx = new Map();
    const bubbleMarkerByIdx = new Map();

    const pointsCluster = L.markerClusterGroup({
      disableClusteringAtZoom: 12,
      spiderfyOnMaxZoom: false,
      showCoverageOnHover: false,
      chunkedLoading: true,
    });
    const bubblesCluster = L.markerClusterGroup({
      maxClusterRadius: 60,
      spiderfyOnMaxZoom: false,
      showCoverageOnHover: false,
      chunkedLoading: true,
      iconCreateFunction: (cluster) => {
        const count = cluster.getChildCount();
        const d = count > 1000 ? 60 : count > 100 ? 50 : count > 10 ? 42 : 36;
        return L.divIcon({
          html: `<div class="bubble-cluster" style="width:${d}px;height:${d}px;line-height:${d}px;">${count}</div>`,
          className: "bubble-cluster-wrap",
          iconSize: [d, d]
        });
      }
    });

    // Major (rank 1) sites are never clustered so they stay visible at every zoom
    const majorPointsLayer = L.layerGroup();
    const majorBubblesLayer = L.layerGroup();

    let heatLayer = null;

    // ── Site label layer (progressive, collision-aware) ───────────────────
    const labelsLayer = L.layerGroup().addTo(map);
    const labelMarkerByIdx = new Map();

    function labelRankCutoff(zoom) {
      if (zoom <= 6)  return 1;
      if (zoom <= 8)  return 2;
      if (zoom <= 9)  return 3;
      return Infinity;
    }

    function labelFontSize(rank) {
      if (rank === 1) return 13;
      if (rank === 2) return 12;
      if (rank === 3) return 11.5;
      return 10.5;
    }

    function makeLabelMarker(feature) {
      const p = feature.properties || {};
      const [lng, lat] = feature.geometry.coordinates;
      const rank = typeof p.rank === 'number' ? p.rank : 4;
      const rankClass = (rank >= 1 && rank <= 5) ? rank : 4;
      const icon = L.divIcon({
        className: 'site-label',
        html: `<span class="site-label-inner rank-${rankClass}">${p.name || ''}</span>`,
        iconSize: [0, 0],
        iconAnchor: [0, 8]
      });
      const marker = L.marker([lat, lng], {
        icon,
        pane: 'labelsPane',
        interactive: false,
        keyboard: false
      });
      labelMarkerByIdx.set(feature._idx, marker);
      return marker;
    }

    function refreshLabels() {
      labelsLayer.clearLayers();
      if (currentView === 'heat') return;

      const zoom = map.getZoom();
      const rankCutoff = labelRankCutoff(zoom);
      const bounds = map.getBounds().pad(0.1);

      const candidates = [];
      currentFiltered.forEach((f) => {
        const p = f.properties || {};
        if (!p.name) return;
        const rank = typeof p.rank === 'number' ? p.rank : 4;
        if (rank > rankCutoff) return;
        const [lng, lat] = f.geometry.coordinates;
        if (!bounds.contains([lat, lng])) return;
        candidates.push({ f, rank, lat, lng, name: p.name });
      });

      candidates.sort((a, b) => a.rank - b.rank || a.name.localeCompare(b.name));

      const placed = [];
      for (const c of candidates) {
        if (placed.length >= 400 && c.rank > 1) continue;
        const pt = map.latLngToContainerPoint([c.lat, c.lng]);
        const fs = labelFontSize(c.rank);
        const w = c.name.length * fs * 0.62 + 18;
        const h = fs + 8;
        const rect = { x1: pt.x + 6, y1: pt.y - h / 2, x2: pt.x + 6 + w, y2: pt.y + h / 2 };
        let collides = false;
        for (const r of placed) {
          if (rect.x1 < r.x2 && rect.x2 > r.x1 && rect.y1 < r.y2 && rect.y2 > r.y1) {
            collides = true;
            break;
          }
        }
        if (collides) continue;
        placed.push(rect);
        const marker = labelMarkerByIdx.get(c.f._idx) || makeLabelMarker(c.f);
        labelsLayer.addLayer(marker);
      }
    }

    function bubbleRadiusFor(rank) {
      if (rank === 1) return 18;
      if (rank === 2) return 12;
      if (rank === 3) return 9;
      if (rank === 4) return 6;
      return 5;
    }

    function makePointMarker(feature, index) {
      const [lng, lat] = feature.geometry.coordinates;
      const rank = feature.properties && feature.properties.rank;
      const isMajor = rank === 1;
      const marker = L.circleMarker([lat, lng], {
        radius: isMajor ? 7 : 5,
        fillColor: '#e2b96f',
        color: '#ffffff',
        weight: isMajor ? 1.6 : 1.2,
        opacity: 1,
        fillOpacity: isMajor ? 1 : 0.9,
      });
      marker.bindPopup(buildPopup(feature.properties));
      marker.on('popupopen', () => setActiveByIdx(index, { skipMapZoom: true }));
      pointMarkerByIdx.set(index, marker);
      return marker;
    }

    function makeBubbleMarker(feature, index) {
      const [lng, lat] = feature.geometry.coordinates;
      const rank = feature.properties && feature.properties.rank;
      const r = bubbleRadiusFor(rank);
      const marker = L.circleMarker([lat, lng], {
        radius: r, fillColor: '#dc503c', color: '#ffffff',
        weight: 1.5, opacity: 1, fillOpacity: 0.55,
      });
      marker.bindPopup(buildPopup(feature.properties));
      marker.on('popupopen', () => setActiveByIdx(index, { skipMapZoom: true }));
      bubbleMarkerByIdx.set(index, marker);
      return marker;
    }

    function haversineKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLng/2) * Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function matchesQuery(feature, q) {
      if (!q) return true;
      const p = feature.properties || {};
      const name = (p.name || '').toLowerCase();
      const country = (p.country || '').toLowerCase();
      const state = (p.state || '').toLowerCase();
      return name.includes(q) || country.includes(q) || state.includes(q);
    }

    function passesFilters(feature) {
      if (!matchesQuery(feature, searchQuery)) return false;
      const rank = feature.properties && feature.properties.rank;
      if (typeof rank === 'number' && rank > activeRankMax) return false;
      if (radiusFilter) {
        const [lng, lat] = feature.geometry.coordinates;
        if (haversineKm(radiusFilter.lat, radiusFilter.lng, lat, lng) > radiusFilter.km) return false;
      }
      return true;
    }

    function clearAllViewLayers() {
      if (map.hasLayer(pointsCluster)) map.removeLayer(pointsCluster);
      if (map.hasLayer(bubblesCluster)) map.removeLayer(bubblesCluster);
      if (map.hasLayer(majorPointsLayer)) map.removeLayer(majorPointsLayer);
      if (map.hasLayer(majorBubblesLayer)) map.removeLayer(majorBubblesLayer);
      if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
      map.closePopup();
    }

    function rebuildCurrentViewLayer() {
      if (currentView === "points") {
        pointsCluster.clearLayers();
        majorPointsLayer.clearLayers();
        const clustered = [];
        currentFiltered.forEach((f) => {
          const m = pointMarkerByIdx.get(f._idx);
          if (!m) return;
          const rank = f.properties && f.properties.rank;
          if (rank === 1) majorPointsLayer.addLayer(m);
          else clustered.push(m);
        });
        pointsCluster.addLayers(clustered);
        if (!map.hasLayer(pointsCluster)) map.addLayer(pointsCluster);
        if (!map.hasLayer(majorPointsLayer)) map.addLayer(majorPointsLayer);
      } else if (currentView === "bubbles") {
        bubblesCluster.clearLayers();
        majorBubblesLayer.clearLayers();
        const clustered = [];
        currentFiltered.forEach((f) => {
          const m = bubbleMarkerByIdx.get(f._idx);
          if (!m) return;
          const rank = f.properties && f.properties.rank;
          if (rank === 1) majorBubblesLayer.addLayer(m);
          else clustered.push(m);
        });
        bubblesCluster.addLayers(clustered);
        if (!map.hasLayer(bubblesCluster)) map.addLayer(bubblesCluster);
        if (!map.hasLayer(majorBubblesLayer)) map.addLayer(majorBubblesLayer);
      } else if (currentView === "heat") {
        const heatPoints = currentFiltered.map((f) => {
          const [lng, lat] = f.geometry.coordinates;
          return [lat, lng, 1];
        });
        if (heatLayer) {
          heatLayer.setLatLngs(heatPoints);
        } else {
          heatLayer = L.heatLayer(heatPoints, {
            radius: 22, blur: 18, maxZoom: 10,
            gradient: { 0.2: "#3288bd", 0.4: "#99d594", 0.6: "#fee08b", 0.8: "#fc8d59", 1.0: "#d53e4f" }
          });
        }
        if (!map.hasLayer(heatLayer)) map.addLayer(heatLayer);
      }
      refreshLabels();
    }

    function setView(view) {
      if (view === currentView) return;
      currentView = view;
      document.querySelectorAll('.view-pill').forEach((b) => {
        b.classList.toggle('active', b.dataset.view === view);
      });
      clearAllViewLayers();
      rebuildCurrentViewLayer();
      updateAnalytics();
    }

    function applyFilters() {
      currentFiltered = allSites.filter(passesFilters);
      rebuildCurrentViewLayer();
      renderList();
      updateCountLabel();
      updateAnalytics();
      if (radiusFilter) updateRadiusReadout();
    }

    function updateCountLabel() {
      const n = currentFiltered.length;
      const fmt = n.toLocaleString('en-US');
      const el = document.getElementById('countLabel');
      if (radiusFilter) {
        el.textContent = `${fmt} site${n === 1 ? '' : 's'} within ${radiusFilter.km} km`;
        return;
      }
      if (!searchQuery && activeRankMax === Infinity) {
        el.textContent = `${fmt} site${n === 1 ? '' : 's'}`;
      } else if (!searchQuery) {
        const label = { 1: 'Major', 2: 'Important+', 3: 'Medium+', 4: 'Minor+' }[activeRankMax] || '';
        el.textContent = `${fmt} ${label} site${n === 1 ? '' : 's'}`;
      } else if (n === 0) {
        el.textContent = 'No sites found';
      } else if (n === 1) {
        el.textContent = '1 site found';
      } else {
        el.textContent = `${fmt} sites match`;
      }
    }

    const listEl = document.getElementById('siteList');

    function renderList() {
      listEl.innerHTML = '';
      if (currentFiltered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = radiusFilter
          ? 'No sites within this radius.'
          : 'No sites match your filters.';
        listEl.appendChild(empty);
        return;
      }
      currentFiltered.forEach((feature) => {
        const p = feature.properties || {};
        const item = document.createElement('li');
        item.className = 'site-item' + (activeIdx === feature._idx ? ' active' : '');
        item.dataset.idx = feature._idx;
        const country = p.country || '';
        const state = p.state || '';
        const meta = [country, state].filter(Boolean).join(' · ');
        item.innerHTML = `
          <span class="site-name">${p.name || 'Unnamed site'}</span>
          <span class="site-meta">${meta}</span>
        `;
        item.addEventListener('click', () => setActiveByIdx(feature._idx));
        listEl.appendChild(item);
      });
    }

    function setActiveByIdx(idx, opts = {}) {
      activeIdx = idx;
      listEl.querySelectorAll('.site-item').forEach((el) => {
        el.classList.toggle('active', parseInt(el.dataset.idx, 10) === idx);
      });
      const activeEl = listEl.querySelector('.site-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      let marker = null;
      if (currentView === "points") marker = pointMarkerByIdx.get(idx);
      else if (currentView === "bubbles") marker = bubbleMarkerByIdx.get(idx);

      if (marker && !opts.skipMapZoom) {
        const latlng = marker.getLatLng();
        const cluster = (currentView === "points") ? pointsCluster : bubblesCluster;
        if (cluster.hasLayer(marker)) {
          cluster.zoomToShowLayer(marker, () => marker.openPopup());
          map.flyTo(latlng, Math.max(map.getZoom(), 10), { duration: 0.8 });
        } else {
          map.flyTo(latlng, Math.max(map.getZoom(), 10), { duration: 0.8 });
          marker.openPopup();
        }
      } else if (currentView === "heat" && !opts.skipMapZoom) {
        const feature = allSites.find((f) => f._idx === idx);
        if (feature) {
          const [lng, lat] = feature.geometry.coordinates;
          map.flyTo([lat, lng], Math.max(map.getZoom(), 10), { duration: 0.8 });
        }
      }
    }

    const searchEl = document.getElementById('search');
    searchEl.addEventListener('input', () => {
      searchQuery = searchEl.value.trim().toLowerCase();
      applyFilters();
    });

    const rankPills = document.querySelectorAll('.rank-pill');
    rankPills.forEach((pill) => {
      pill.addEventListener('click', () => {
        const r = parseInt(pill.dataset.rank, 10);
        if (activeRankMax === r) {
          activeRankMax = Infinity;
          rankPills.forEach((p) => p.classList.remove('active'));
        } else {
          activeRankMax = r;
          rankPills.forEach((p) => {
            p.classList.toggle('active', parseInt(p.dataset.rank, 10) === r);
          });
        }
        applyFilters();
      });
    });

    document.querySelectorAll('.view-pill').forEach((b) => {
      b.addEventListener('click', () => setView(b.dataset.view));
    });

    const radiusBtn = document.getElementById('radiusBtn');
    const radiusControl = document.getElementById('radiusControl');
    const rcSlider = document.getElementById('rcSlider');
    const rcKm = document.getElementById('rcKm');
    const rcReadout = document.getElementById('rcReadout');
    const rcHint = document.getElementById('rcHint');

    function updateRadiusReadout() {
      if (!radiusFilter) return;
      const n = currentFiltered.length;
      rcReadout.innerHTML = `<strong>${n.toLocaleString()}</strong> site${n === 1 ? '' : 's'} within ${radiusFilter.km} km`;
    }

    function setRadiusToolActive(on) {
      radiusToolActive = on;
      radiusBtn.classList.toggle('active', on);
      radiusControl.classList.toggle('open', on);
      const c = map.getContainer();
      c.classList.toggle('radius-active', on);

      if (!on) {
        if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
        radiusFilter = null;
        applyFilters();
      } else {
        rcHint.style.display = 'block';
        rcReadout.innerHTML = `<strong>0</strong> sites — click the map to begin`;
      }
    }

    radiusBtn.addEventListener('click', () => setRadiusToolActive(!radiusToolActive));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (radiusToolActive) setRadiusToolActive(false);
        if (analyticsPanel.classList.contains('open')) closeAnalytics();
      }
    });

    function drawRadius(latlng) {
      const km = parseInt(rcSlider.value, 10);
      if (radiusCircle) {
        radiusCircle.setLatLng(latlng);
        radiusCircle.setRadius(km * 1000);
      } else {
        radiusCircle = L.circle(latlng, {
          radius: km * 1000, color: '#dc3c3c', weight: 2, fill: false
        }).addTo(map);
      }
      radiusFilter = { lat: latlng.lat, lng: latlng.lng, km };
      rcHint.style.display = 'none';
      applyFilters();
    }

    map.on('click', (e) => {
      if (!radiusToolActive) return;
      drawRadius(e.latlng);
    });

    rcSlider.addEventListener('input', () => {
      const km = parseInt(rcSlider.value, 10);
      rcKm.textContent = km + ' km';
      if (radiusCircle && radiusFilter) {
        radiusCircle.setRadius(km * 1000);
        radiusFilter.km = km;
        applyFilters();
      }
    });

    // ── Panel drag ────────────────────────────────────────────────────────
    const panel = document.getElementById('panel');
    const panelHeader = panel.querySelector('.panel-header');
    const isMobile = () => window.matchMedia('(max-width: 600px)').matches;

    let drag = null;
    function clampToViewport(left, top) {
      const rect = panel.getBoundingClientRect();
      const maxLeft = Math.max(0, window.innerWidth - rect.width);
      const maxTop = Math.max(0, window.innerHeight - rect.height);
      return { left: Math.min(Math.max(0, left), maxLeft), top: Math.min(Math.max(0, top), maxTop) };
    }
    function getEventPoint(e) {
      if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    }
    function onDragStart(e) {
      if (isMobile()) return;
      if (e.target.closest('button, input, a')) return;
      const rect = panel.getBoundingClientRect();
      const point = getEventPoint(e);
      drag = { offsetX: point.x - rect.left, offsetY: point.y - rect.top };
      panel.classList.add('dragging');
      if (e.cancelable) e.preventDefault();
    }
    function onDragMove(e) {
      if (!drag) return;
      const point = getEventPoint(e);
      const next = clampToViewport(point.x - drag.offsetX, point.y - drag.offsetY);
      panel.style.left = next.left + 'px';
      panel.style.top = next.top + 'px';
      if (e.cancelable) e.preventDefault();
    }
    function onDragEnd() {
      if (!drag) return;
      drag = null;
      panel.classList.remove('dragging');
    }
    panelHeader.addEventListener('mousedown', onDragStart);
    window.addEventListener('mousemove', onDragMove);
    window.addEventListener('mouseup', onDragEnd);
    panelHeader.addEventListener('touchstart', onDragStart, { passive: false });
    window.addEventListener('touchmove', onDragMove, { passive: false });
    window.addEventListener('touchend', onDragEnd);
    window.addEventListener('touchcancel', onDragEnd);

    function handleResize() {
      if (isMobile()) {
        panel.style.left = ''; panel.style.top = '';
        return;
      }
      const rect = panel.getBoundingClientRect();
      const next = clampToViewport(rect.left, rect.top);
      panel.style.left = next.left + 'px';
      panel.style.top = next.top + 'px';
    }
    window.addEventListener('resize', handleResize);
    handleResize();

    // ── Analytics panel ───────────────────────────────────────────────────
    const detailsTab = document.getElementById('detailsTab');
    const analyticsPanel = document.getElementById('analyticsPanel');
    const apClose = document.getElementById('apClose');
    const apCount = document.getElementById('apCount');

    function openAnalytics() {
      analyticsPanel.classList.add('open');
      analyticsPanel.setAttribute('aria-hidden', 'false');
      detailsTab.classList.add('hidden');
      updateAnalytics();
    }
    function closeAnalytics() {
      analyticsPanel.classList.remove('open');
      analyticsPanel.setAttribute('aria-hidden', 'true');
      detailsTab.classList.remove('hidden');
    }
    detailsTab.addEventListener('click', openAnalytics);
    apClose.addEventListener('click', closeAnalytics);

    // ── Analytics charts (Chart.js), scoped to the current map view ──────
    let chartCountry = null;
    let chartStates = null;
    let chartRank = null;

    const COUNTRY_COLORS = ['#e2b96f', '#c98d4b', '#8d6e63', '#5d7a8a', '#a3b18a', '#b0743c', '#9ca3af'];
    const RANK_BAR_COLORS = ['#b07d2a', '#c9994a', '#e2b96f', '#edd0a0', '#f3ddb8'];

    if (typeof Chart !== 'undefined' && typeof ChartDataLabels !== 'undefined') {
      Chart.register(ChartDataLabels);
      Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif";
      Chart.defaults.color = '#6b7280';
    }

    function sitesInView() {
      const bounds = map.getBounds();
      return currentFiltered.filter((f) => {
        const [lng, lat] = f.geometry.coordinates;
        return bounds.contains([lat, lng]);
      });
    }

    function computeAnalyticsData(sites) {
      const byCountry = {};
      const byState = {};
      const rankCounts = [0, 0, 0, 0, 0];
      sites.forEach((f) => {
        const p = f.properties || {};
        const c = p.country || 'Unknown';
        byCountry[c] = (byCountry[c] || 0) + 1;
        const s = p.state || 'Unknown';
        byState[s] = (byState[s] || 0) + 1;
        const r = typeof p.rank === 'number' ? p.rank : null;
        if (r >= 1 && r <= 5) rankCounts[r - 1] += 1;
      });
      const countryEntries = Object.entries(byCountry).sort((a, b) => b[1] - a[1]);
      const stateEntries = Object.entries(byState).sort((a, b) => b[1] - a[1]).slice(0, 8);
      return { countryEntries, stateEntries, rankCounts };
    }

    function renderCharts(sites) {
      if (typeof Chart === 'undefined') return;
      const { countryEntries, stateEntries, rankCounts } = computeAnalyticsData(sites);

      const cLabels = countryEntries.map((e) => e[0]);
      const cData = countryEntries.map((e) => e[1]);
      if (!chartCountry) {
        chartCountry = new Chart(document.getElementById('chartCountry'), {
          type: 'doughnut',
          data: {
            labels: cLabels,
            datasets: [{
              data: cData,
              backgroundColor: COUNTRY_COLORS,
              borderColor: '#fafafa',
              borderWidth: 2,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '55%',
            plugins: {
              legend: {
                position: 'right',
                labels: { boxWidth: 10, boxHeight: 10, padding: 10, font: { size: 11 } }
              },
              datalabels: {
                color: '#1a1a1a',
                font: { size: 10, weight: '600' },
                formatter: (value, ctx) => {
                  const sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                  return sum > 0 && value / sum >= 0.05 ? value.toLocaleString() : '';
                }
              }
            }
          }
        });
      } else {
        chartCountry.data.labels = cLabels;
        chartCountry.data.datasets[0].data = cData;
        chartCountry.update('none');
      }

      const sLabels = stateEntries.map((e) => e[0]);
      const sData = stateEntries.map((e) => e[1]);
      if (!chartStates) {
        chartStates = new Chart(document.getElementById('chartStates'), {
          type: 'bar',
          data: {
            labels: sLabels,
            datasets: [{
              data: sData,
              backgroundColor: '#e2b96f',
              borderRadius: 6,
              barThickness: 13,
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 34 } },
            scales: {
              x: { grid: { color: '#eeeeee' }, ticks: { font: { size: 10 } }, beginAtZero: true },
              y: { grid: { display: false }, ticks: { font: { size: 11 } } }
            },
            plugins: {
              legend: { display: false },
              datalabels: {
                anchor: 'end', align: 'right',
                color: '#6b7280',
                font: { size: 10, weight: '600' },
                formatter: (v) => v.toLocaleString()
              }
            }
          }
        });
      } else {
        chartStates.data.labels = sLabels;
        chartStates.data.datasets[0].data = sData;
        chartStates.update('none');
      }

      if (!chartRank) {
        chartRank = new Chart(document.getElementById('chartRank'), {
          type: 'bar',
          data: {
            labels: ['Major', 'Important', 'Medium', 'Minor', 'Minimal'],
            datasets: [{
              data: rankCounts,
              backgroundColor: RANK_BAR_COLORS,
              borderRadius: 6,
              barThickness: 26,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 18 } },
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 10.5 } } },
              y: { grid: { color: '#eeeeee' }, ticks: { font: { size: 10 } }, beginAtZero: true }
            },
            plugins: {
              legend: { display: false },
              datalabels: {
                anchor: 'end', align: 'end',
                color: '#6b7280',
                font: { size: 10, weight: '600' },
                formatter: (v) => v.toLocaleString()
              }
            }
          }
        });
      } else {
        chartRank.data.datasets[0].data = rankCounts;
        chartRank.update('none');
      }
    }

    function updateAnalytics() {
      const inView = sitesInView();
      if (apCount) apCount.textContent = inView.length.toLocaleString('en-US');
      renderCharts(inView);
    }

    // ── Refresh labels and analytics when the view changes ───────────────
    map.on('zoomend', () => { refreshLabels(); updateAnalytics(); });
    map.on('moveend', () => { refreshLabels(); updateAnalytics(); });

    // ── Load GeoJSON and build markers ────────────────────────────────────
    fetch('data/maya_sites.geojson')
      .then(response => {
        if (!response.ok) throw new Error(`Failed to load GeoJSON: ${response.status}`);
        return response.json();
      })
      .then(geojson => {
        const features = geojson.features.slice();
        features.sort((a, b) => {
          const an = (a.properties && a.properties.name) || '';
          const bn = (b.properties && b.properties.name) || '';
          return an.localeCompare(bn, 'en', { sensitivity: 'base' });
        });
        allSites = features.map((f, i) => { f._idx = i; return f; });

        allSites.forEach((feature) => {
          makePointMarker(feature, feature._idx);
          makeBubbleMarker(feature, feature._idx);
        });

        currentFiltered = allSites.slice();
        rebuildCurrentViewLayer();

        renderList();
        updateCountLabel();
        updateAnalytics();

        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.style.transition = 'opacity 0.3s ease';
          loading.style.opacity = '0';
          setTimeout(() => loading.remove(), 300);
        }
      })
      .catch(error => {
        console.error('Error loading Maya sites:', error);
        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.textContent = 'Error loading site data. Please try refreshing.';
          loading.style.background = '#fce4e4';
          loading.style.color = '#c0392b';
        }
      });
  </script>
</body>
</html>
