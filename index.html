<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maya Modern Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .map-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      background: rgba(255, 255, 255, 0.95);
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1a2340;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div class="map-loading" id="loadingIndicator">Loading map...</div>

  <!-- Leaflet JavaScript -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <script>
    // ── Initialise the map ─────────────────────────────────────────────────
    // The Maya region spans roughly latitude 14 to 22 north,
    // longitude -92 to -86 west. We centre on (16.5, -89.5) which sits
    // in northern Guatemala, with a zoom level that shows the full region.
    const map = L.map('map', {
      center: [16.5, -89.5],
      zoom: 6,
      minZoom: 3,
      maxZoom: 18,
      zoomControl: true,
    });

    // ── Add the OpenStreetMap basemap as the default ───────────────────────
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    });
    osm.addTo(map);

    // ── Hide the loading indicator once the map is ready ───────────────────
    map.whenReady(() => {
      const loading = document.getElementById('loadingIndicator');
      if (loading) {
        loading.style.transition = 'opacity 0.3s ease';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 300);
      }
    });

    // Log to console for development verification
    console.log('Maya Modern Map initialised');
    console.log('Centre:', map.getCenter());
    console.log('Zoom:', map.getZoom());
  </script>
</body>
</html>
