<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maya Modern Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <style>
    :root {
      --gold: #e2b96f;
      --gold-soft: #f3d699;
      --panel-bg: #ffffff;
      --chip-bg: #eeeeee;
      --chip-bg-hover: #e5e5e5;
      --text: #1a1a1a;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --popup-bg: #16213e;
      --map-bg: #0e1424;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%; margin: 0; padding: 0; width: 100%;
      background: var(--map-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #map { position: absolute; inset: 0; height: 100%; width: 100%; background: var(--map-bg); }
    .leaflet-container { background: var(--map-bg); font-family: inherit; }

    .map-loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      background: var(--panel-bg);
      padding: 1rem 1.5rem; border-radius: 12px;
      font-size: 13px; color: var(--text);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      font-weight: 500;
    }

    /* ---------- Floating panel ---------- */
    .panel {
      position: absolute;
      top: 16px; left: 16px;
      z-index: 650;
      width: 300px;
      background: var(--panel-bg);
      color: var(--text);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 10px;
    }
    .panel-header {
      height: 14px; user-select: none;
      margin: -6px -4px 2px; border-radius: 10px;
      position: relative;
    }
    .panel-header::before {
      content: ""; position: absolute;
      top: 4px; left: 50%; transform: translateX(-50%);
      width: 36px; height: 4px;
      border-radius: 4px; background: #d1d5db;
    }

    /* ---------- Search row ---------- */
    .search-row { display: flex; gap: 8px; align-items: stretch; }
    .search-row .search-wrap { flex: 1; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%;
      background: var(--chip-bg);
      border: none; outline: none;
      border-radius: 12px;
      padding: 10px 14px 10px 34px;
      font-size: 12px; color: var(--text);
      font-family: inherit;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .search-input::placeholder { color: #9ca3af; }
    .search-input:focus {
      background: var(--chip-bg-hover);
      box-shadow: 0 0 0 3px rgba(226, 185, 111, 0.25);
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #9ca3af; pointer-events: none;
      width: 14px; height: 14px;
    }

    .radius-btn {
      flex: 0 0 auto;
      background: var(--chip-bg);
      border: none; border-radius: 12px;
      padding: 0 14px;
      font-size: 12.5px; font-weight: 500;
      color: var(--text); cursor: pointer;
      font-family: inherit; white-space: nowrap;
      transition: background 0.16s ease, color 0.16s ease;
    }
    .radius-btn:hover { background: var(--chip-bg-hover); }
    .radius-btn.active { background: var(--gold); color: #1a1a1a; }

    .count-label {
      font-size: 11.5px; color: var(--muted-2);
      padding: 0 4px;
      letter-spacing: 0.2px;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Rank filter pills ---------- */
    .rank-filter { display: flex; gap: 5px; }
    .rank-pill {
      flex: 1;
      background: var(--chip-bg);
      border: none; border-radius: 999px;
      padding: 5px 2px;
      font-size: 10.5px; font-weight: 500;
      color: var(--text);
      cursor: pointer; font-family: inherit;
      transition: background 0.16s ease, color 0.16s ease;
      white-space: nowrap; text-align: center;
    }
    .rank-pill:hover { background: var(--chip-bg-hover); }
    .rank-pill.active { background: var(--gold); color: #1a1a1a; }

    /* ---------- Site list ---------- */
    .site-list-wrap { overflow: hidden; }
    .site-list {
      max-height: 280px;
      overflow-y: auto;
      margin: 0;
      padding: 0 2px 0 0;
      list-style: none;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }
    .site-list::-webkit-scrollbar { width: 6px; }
    .site-list::-webkit-scrollbar-track { background: transparent; }
    .site-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 8px; }
    .site-list::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    .site-item {
      padding: 8px 12px; margin: 2px 0;
      border-radius: 10px; cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      display: flex; flex-direction: column; gap: 2px;
      user-select: none;
    }
    .site-item:hover { background: var(--chip-bg); }
    .site-item.active { background: var(--gold); color: var(--text); }
    .site-item.active .site-meta { color: rgba(26, 26, 26, 0.72); }
    .site-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.25; }
    .site-meta { font-size: 11px; color: var(--muted); line-height: 1.2; }
    .empty {
      padding: 16px 12px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      font-style: italic;
    }

    /* ---------- View toggle pills (floating, bottom-left) ---------- */
    .view-toggle {
      position: absolute;
      bottom: 30px;
      left: 16px;
      z-index: 1000;
      display: flex;
      gap: 6px;
    }

    .view-pill {
      background: #ffffff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      transition: background 0.18s ease, color 0.18s ease, transform 0.15s ease;
      white-space: nowrap;
    }
    .view-pill:hover {
      background: #f5f5f5;
      transform: translateY(-1px);
    }
    .view-pill.active {
      background: var(--gold);
      color: #1a1a1a;
    }
    .view-pill.active:hover { background: var(--gold); }

    /* ---------- Bubble cluster (used in Bubbles view) ---------- */
    .bubble-cluster-wrap {
      background: transparent !important;
      border: none !important;
    }
    .bubble-cluster {
      background: rgba(220, 80, 60, 0.5);
      border: 2px solid rgba(220, 80, 60, 0.9);
      color: #ffffff;
      font-weight: 700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-variant-numeric: tabular-nums;
    }
    .bubble-cluster:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 14px rgba(220, 80, 60, 0.35);
    }

    /* ---------- Leaflet zoom control ---------- */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15) !important;
      border-radius: 10px !important; overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: var(--panel-bg) !important;
      color: var(--text) !important;
      border: none !important;
      border-bottom: 1px solid #eeeeee !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-zoom a:hover { background: #f5f5f5 !important; }
    .leaflet-bar { border: none !important; }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.85) !important;
      color: var(--muted) !important;
      font-size: 10.5px; border-radius: 6px;
      margin: 0 8px 8px 0 !important; padding: 2px 8px;
    }
    .leaflet-control-attribution a { color: var(--text) !important; }

    /* ---------- Dark popups ---------- */
    .leaflet-popup-content-wrapper {
      background: var(--popup-bg) !important;
      color: #e8ecf4 !important;
      border-radius: 14px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45) !important;
      border: 1px solid rgba(226, 185, 111, 0.25);
      padding: 4px;
    }
    .leaflet-popup-content { margin: 14px 16px !important; line-height: 1.5; font-size: 13px; min-width: 220px; }
    .leaflet-popup-tip { background: var(--popup-bg) !important; border: 1px solid rgba(226, 185, 111, 0.25); }
    .leaflet-popup-close-button { color: #8a93a8 !important; font-size: 20px !important; padding: 8px 10px 0 0 !important; }
    .leaflet-popup-close-button:hover { color: var(--gold) !important; }

    .popup-title { color: var(--gold); font-weight: 700; font-size: 15px; margin: 0 0 4px 0; }
    .popup-sub { color: #8a93a8; font-size: 11px; text-transform: uppercase; letter-spacing: 1.1px; margin-bottom: 8px; font-weight: 600; }
    .popup-sub .sep { margin: 0 6px; opacity: 0.45; }
    .popup-rank {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(226, 185, 111, 0.18);
      color: var(--gold); border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .popup-rank .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    /* ---------- Marker clusters ---------- */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large,
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div { background: transparent !important; }
    .marker-cluster {
      background: rgba(226, 185, 111, 0.35);
      border: 2px solid rgba(226, 185, 111, 0.8);
      color: #1a1a1a; font-weight: 700; border-radius: 50%;
    }
    .marker-cluster div {
      background: rgba(226, 185, 111, 0.6);
      color: #1a1a1a; font-weight: 700;
    }

    /* ---------- Bottom-right control stack ---------- */
    .map-controls-br {
      position: absolute; bottom: 30px; right: 10px;
      z-index: 1000;
      display: flex; flex-direction: column;
      gap: 8px; align-items: flex-end;
    }
    .map-icon-btn {
      width: 38px; height: 38px;
      background: #ffffff; color: #1a1a1a;
      border: none; border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.15s ease, transform 0.15s ease, color 0.15s ease;
    }
    .map-icon-btn:hover { background: #f5f5f5; transform: translateY(-1px); }
    .map-icon-btn.active { background: var(--gold); color: #1a1a1a; }
    .map-icon-btn svg { width: 19px; height: 19px; display: block; }
    .map-icon-btn.loading svg { animation: locspin 0.9s linear infinite; }
    @keyframes locspin { to { transform: rotate(360deg); } }

    .layers-wrap { position: relative; display: flex; }

    .basemap-popover {
      position: absolute; right: 0;
      bottom: calc(100% + 8px);
      width: 222px;
      background: #ffffff; border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
      padding: 6px;
      display: flex; flex-direction: column; gap: 2px;
      opacity: 0; visibility: hidden;
      transform: translateY(6px) scale(0.98);
      transform-origin: bottom right;
      transition: opacity 0.16s ease, transform 0.16s ease, visibility 0.16s;
    }
    .basemap-popover.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    .bm-option {
      display: flex; align-items: center; gap: 9px;
      background: transparent; border: none; border-radius: 8px;
      padding: 8px 10px; cursor: pointer; font-family: inherit;
      text-align: left; transition: background 0.14s ease;
    }
    .bm-option:hover { background: var(--chip-bg); }
    .bm-option .bm-check { flex: 0 0 16px; width: 16px; height: 16px; color: var(--gold); opacity: 0; display: inline-flex; align-items: center; justify-content: center; }
    .bm-option .bm-check svg { width: 16px; height: 16px; }
    .bm-option.active .bm-check { opacity: 1; }
    .bm-option .bm-text { display: flex; flex-direction: column; gap: 1px; }
    .bm-option .bm-name { font-size: 13px; font-weight: 500; color: #1a1a1a; line-height: 1.2; }
    .bm-option.active .bm-name { color: #b07d2a; font-weight: 600; }
    .bm-option .bm-sub { font-size: 11px; color: var(--muted); line-height: 1.2; font-style: italic; }

    /* ---------- User location marker ---------- */
    .user-loc-icon { background: transparent; border: none; }
    .user-loc-dot {
      position: relative; width: 16px; height: 16px;
      border-radius: 50%; background: #4285F4;
      border: 3px solid #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      z-index: 1;
    }
    .user-loc-dot::before {
      content: ""; position: absolute; left: 50%; top: 50%;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(66, 133, 244, 0.35);
      transform: translate(-50%, -50%);
      z-index: -1; animation: locpulse 2s ease-out infinite;
    }
    @keyframes locpulse {
      0% { width: 16px; height: 16px; opacity: 0.6; }
      100% { width: 56px; height: 56px; opacity: 0; }
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div class="map-loading" id="loadingIndicator">Loading Maya sites...</div>

  <!-- Floating panel (top-left) -->
  <div class="panel" id="panel">
    <div class="panel-header" aria-label="Panel"></div>

    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search" class="search-input" type="text" placeholder="Search sites..." autocomplete="off" spellcheck="false">
      </div>
      <button class="radius-btn" id="radiusBtn" type="button">Radius</button>
    </div>

    <div class="count-label" id="countLabel">Loading sites...</div>

    <div class="rank-filter" id="rankFilter" role="group" aria-label="Filter by significance">
      <button class="rank-pill" type="button" data-rank="1">Major</button>
      <button class="rank-pill" type="button" data-rank="2">Important</button>
      <button class="rank-pill" type="button" data-rank="3">Medium</button>
      <button class="rank-pill" type="button" data-rank="4">Minor</button>
    </div>

    <div class="site-list-wrap">
      <ul class="site-list" id="siteList"></ul>
    </div>
  </div>

  <!-- View toggle (bottom-left) -->
  <div class="view-toggle" role="tablist" aria-label="View mode">
    <button class="view-pill active" id="viewPoints" type="button" data-view="points">Points</button>
    <button class="view-pill" id="viewBubbles" type="button" data-view="bubbles">Bubbles</button>
    <button class="view-pill" id="viewHeat" type="button" data-view="heat">Heat</button>
  </div>

  <!-- Bottom-right control stack -->
  <div class="map-controls-br">
    <button class="map-icon-btn" id="locateBtn" type="button" title="Find my location" aria-label="Find my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="7"></circle>
        <line x1="12" y1="1" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="23"></line>
        <line x1="1" y1="12" x2="4" y2="12"></line>
        <line x1="20" y1="12" x2="23" y2="12"></line>
        <circle cx="12" cy="12" r="2.4" fill="currentColor" stroke="none"></circle>
      </svg>
    </button>
    <div class="layers-wrap">
      <button class="map-icon-btn" id="layersBtn" type="button" title="Basemaps" aria-label="Choose basemap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
          <polyline points="2 17 12 22 22 17"></polyline>
          <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
      </button>
      <div class="basemap-popover" id="basemapPopover"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <script>
    // ── Initialise the map ─────────────────────────────────────────────────
    const map = L.map('map', {
      center: [16.5, -89.5],
      zoom: 6, minZoom: 3, maxZoom: 18,
      zoomControl: true,
    });

    // ── Basemaps ──────────────────────────────────────────────────────────
    const basemaps = {
      "OpenStreetMap": L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap contributors" }
      ),
      "Esri Topo": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      ),
      "Dark": L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
        { maxZoom: 19, attribution: "&copy; OpenStreetMap, &copy; CARTO" }
      ),
      "Satellite": L.tileLayer(
        "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        { maxZoom: 19, attribution: "Tiles &copy; Esri" }
      )
    };
    let activeBasemap = basemaps["OpenStreetMap"];
    activeBasemap.addTo(map);
    let activeBasemapName = "OpenStreetMap";

    const basemapMeta = [
      { name: "OpenStreetMap", sub: "Standard street map" },
      { name: "Esri Topo",     sub: "Terrain & topography" },
      { name: "Dark",          sub: "Muted dark canvas" },
      { name: "Satellite",     sub: "Aerial imagery" }
    ];
    const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    const basemapPopover = document.getElementById("basemapPopover");
    const layersBtn = document.getElementById("layersBtn");

    function renderBasemapOptions() {
      basemapPopover.querySelectorAll(".bm-option").forEach((el) => el.remove());
      basemapMeta.forEach(({ name, sub }) => {
        const opt = document.createElement("button");
        opt.type = "button";
        opt.className = "bm-option" + (name === activeBasemapName ? " active" : "");
        opt.innerHTML = `<span class="bm-check">${CHECK_SVG}</span><span class="bm-text"><span class="bm-name">${name}</span><span class="bm-sub">${sub}</span></span>`;
        opt.addEventListener("click", () => {
          if (name !== activeBasemapName) {
            map.removeLayer(activeBasemap);
            activeBasemap = basemaps[name];
            activeBasemap.addTo(map);
            activeBasemapName = name;
            renderBasemapOptions();
          }
          closeBasemapPopover();
        });
        basemapPopover.appendChild(opt);
      });
    }
    function openBasemapPopover() { basemapPopover.classList.add("open"); layersBtn.classList.add("active"); }
    function closeBasemapPopover() { basemapPopover.classList.remove("open"); layersBtn.classList.remove("active"); }

    layersBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (basemapPopover.classList.contains("open")) closeBasemapPopover();
      else openBasemapPopover();
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".layers-wrap")) closeBasemapPopover();
    });
    renderBasemapOptions();

    // ── Find my location ──────────────────────────────────────────────────
    const locateBtn = document.getElementById("locateBtn");
    let locationMarker = null;

    locateBtn.addEventListener("click", () => {
      if (!navigator.geolocation) { alert("Your browser does not support geolocation."); return; }
      locateBtn.classList.add("loading");
      map.locate({ setView: false, enableHighAccuracy: true, timeout: 10000 });
    });
    map.on("locationfound", (e) => {
      locateBtn.classList.remove("loading");
      if (locationMarker) map.removeLayer(locationMarker);
      const icon = L.divIcon({
        className: "user-loc-icon",
        html: '<div class="user-loc-dot"></div>',
        iconSize: [16, 16], iconAnchor: [8, 8]
      });
      locationMarker = L.marker(e.latlng, { icon, zIndexOffset: 1000 }).addTo(map);
      locationMarker.bindPopup('<div class="popup-title" style="margin:0">You are here</div>', { maxWidth: 200 }).openPopup();
      map.flyTo(e.latlng, Math.max(map.getZoom(), 10), { duration: 1.2 });
    });
    map.on("locationerror", () => {
      locateBtn.classList.remove("loading");
      alert("Unable to find your location. Please allow location access in your browser.");
    });

    // ── Rank labels ───────────────────────────────────────────────────────
    const RANK_LABELS = {
      1: 'Major centre', 2: 'Important site', 3: 'Medium site', 4: 'Minor site', 5: 'Minimal remains',
    };

    function buildPopup(properties) {
      const name = properties.name || 'Unnamed site';
      const country = properties.country || '';
      const state = properties.state || '';
      const rank = properties.rank;
      const rankLabel = RANK_LABELS[rank] || (rank ? `Rank ${rank}` : null);
      const subParts = [country, state].filter(Boolean);
      const subLine = subParts.length > 0
        ? `<div class="popup-sub">${subParts.join('<span class="sep">·</span>')}</div>` : '';
      const rankBadge = rankLabel
        ? `<div class="popup-rank"><span class="dot"></span>${rankLabel}</div>` : '';
      return `<div class="popup-title">${name}</div>${subLine}${rankBadge}`;
    }

    // ── Site state ────────────────────────────────────────────────────────
    let allSites = [];
    let currentFiltered = [];
    let searchQuery = "";
    let activeRankMax = Infinity;
    let activeIdx = null;
    let currentView = "points";

    const pointMarkerByIdx = new Map();   // Maps used in Points mode
    const bubbleMarkerByIdx = new Map();  // Maps used in Bubbles mode

    // Points cluster (Points mode)
    const pointsCluster = L.markerClusterGroup({
      disableClusteringAtZoom: 12,
      spiderfyOnMaxZoom: false,
      showCoverageOnHover: false,
      chunkedLoading: true,
    });

    // Bubbles cluster: shows count in red bubble at low zoom, individual bubbles at high zoom
    const bubblesCluster = L.markerClusterGroup({
      maxClusterRadius: 60,
      spiderfyOnMaxZoom: false,
      showCoverageOnHover: false,
      chunkedLoading: true,
      iconCreateFunction: (cluster) => {
        const count = cluster.getChildCount();
        const d = count > 1000 ? 60 : count > 100 ? 50 : count > 10 ? 42 : 36;
        return L.divIcon({
          html: `<div class="bubble-cluster" style="width:${d}px;height:${d}px;line-height:${d}px;">${count}</div>`,
          className: "bubble-cluster-wrap",
          iconSize: [d, d]
        });
      }
    });

    // Heat layer (Heat mode)
    let heatLayer = null;

    function bubbleRadiusFor(rank) {
      // Major centres are largest, minor sites smallest
      if (rank === 1) return 18;
      if (rank === 2) return 12;
      if (rank === 3) return 9;
      if (rank === 4) return 6;
      return 5;
    }

    function makePointMarker(feature, index) {
      const [lng, lat] = feature.geometry.coordinates;
      const marker = L.circleMarker([lat, lng], {
        radius: 5,
        fillColor: '#e2b96f',
        color: '#ffffff',
        weight: 1.2, opacity: 1, fillOpacity: 0.9,
      });
      marker.bindPopup(buildPopup(feature.properties));
      marker.on('popupopen', () => setActiveByIdx(index, { skipMapZoom: true }));
      pointMarkerByIdx.set(index, marker);
      return marker;
    }

    function makeBubbleMarker(feature, index) {
      const [lng, lat] = feature.geometry.coordinates;
      const rank = feature.properties && feature.properties.rank;
      const r = bubbleRadiusFor(rank);
      const marker = L.circleMarker([lat, lng], {
        radius: r,
        fillColor: '#dc503c',
        color: '#ffffff',
        weight: 1.5, opacity: 1, fillOpacity: 0.55,
      });
      marker.bindPopup(buildPopup(feature.properties));
      marker.on('popupopen', () => setActiveByIdx(index, { skipMapZoom: true }));
      bubbleMarkerByIdx.set(index, marker);
      return marker;
    }

    function matchesQuery(feature, q) {
      if (!q) return true;
      const p = feature.properties || {};
      const name = (p.name || '').toLowerCase();
      const country = (p.country || '').toLowerCase();
      const state = (p.state || '').toLowerCase();
      return name.includes(q) || country.includes(q) || state.includes(q);
    }

    function passesFilters(feature) {
      if (!matchesQuery(feature, searchQuery)) return false;
      const rank = feature.properties && feature.properties.rank;
      if (typeof rank === 'number' && rank > activeRankMax) return false;
      return true;
    }

    function clearAllViewLayers() {
      if (map.hasLayer(pointsCluster)) map.removeLayer(pointsCluster);
      if (map.hasLayer(bubblesCluster)) map.removeLayer(bubblesCluster);
      if (heatLayer && map.hasLayer(heatLayer)) map.removeLayer(heatLayer);
      map.closePopup();
    }

    function rebuildCurrentViewLayer() {
      if (currentView === "points") {
        pointsCluster.clearLayers();
        const markers = [];
        currentFiltered.forEach((f) => {
          const m = pointMarkerByIdx.get(f._idx);
          if (m) markers.push(m);
        });
        pointsCluster.addLayers(markers);
        if (!map.hasLayer(pointsCluster)) map.addLayer(pointsCluster);
      } else if (currentView === "bubbles") {
        bubblesCluster.clearLayers();
        const markers = [];
        currentFiltered.forEach((f) => {
          const m = bubbleMarkerByIdx.get(f._idx);
          if (m) markers.push(m);
        });
        bubblesCluster.addLayers(markers);
        if (!map.hasLayer(bubblesCluster)) map.addLayer(bubblesCluster);
      } else if (currentView === "heat") {
        const heatPoints = currentFiltered.map((f) => {
          const [lng, lat] = f.geometry.coordinates;
          return [lat, lng, 1];
        });
        if (heatLayer) {
          heatLayer.setLatLngs(heatPoints);
        } else {
          heatLayer = L.heatLayer(heatPoints, {
            radius: 22,
            blur: 18,
            maxZoom: 10,
            gradient: {
              0.2: "#3288bd",
              0.4: "#99d594",
              0.6: "#fee08b",
              0.8: "#fc8d59",
              1.0: "#d53e4f"
            }
          });
        }
        if (!map.hasLayer(heatLayer)) map.addLayer(heatLayer);
      }
    }

    function setView(view) {
      if (view === currentView) return;
      currentView = view;
      document.querySelectorAll('.view-pill').forEach((b) => {
        b.classList.toggle('active', b.dataset.view === view);
      });
      clearAllViewLayers();
      rebuildCurrentViewLayer();
    }

    function applyFilters() {
      currentFiltered = allSites.filter(passesFilters);
      rebuildCurrentViewLayer();
      renderList();
      updateCountLabel();
    }

    function updateCountLabel() {
      const n = currentFiltered.length;
      const fmt = n.toLocaleString('en-US');
      const el = document.getElementById('countLabel');

      if (!searchQuery && activeRankMax === Infinity) {
        el.textContent = `${fmt} site${n === 1 ? '' : 's'}`;
      } else if (!searchQuery) {
        const label = { 1: 'Major', 2: 'Important+', 3: 'Medium+', 4: 'Minor+' }[activeRankMax] || '';
        el.textContent = `${fmt} ${label} site${n === 1 ? '' : 's'}`;
      } else if (n === 0) {
        el.textContent = 'No sites found';
      } else if (n === 1) {
        el.textContent = '1 site found';
      } else {
        el.textContent = `${fmt} sites match`;
      }
    }

    // ── Site list ─────────────────────────────────────────────────────────
    const listEl = document.getElementById('siteList');

    function renderList() {
      listEl.innerHTML = '';
      if (currentFiltered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = 'No sites match your filters.';
        listEl.appendChild(empty);
        return;
      }
      currentFiltered.forEach((feature) => {
        const p = feature.properties || {};
        const item = document.createElement('li');
        item.className = 'site-item' + (activeIdx === feature._idx ? ' active' : '');
        item.dataset.idx = feature._idx;
        const country = p.country || '';
        const state = p.state || '';
        const meta = [country, state].filter(Boolean).join(' · ');
        item.innerHTML = `
          <span class="site-name">${p.name || 'Unnamed site'}</span>
          <span class="site-meta">${meta}</span>
        `;
        item.addEventListener('click', () => setActiveByIdx(feature._idx));
        listEl.appendChild(item);
      });
    }

    function setActiveByIdx(idx, opts = {}) {
      activeIdx = idx;
      listEl.querySelectorAll('.site-item').forEach((el) => {
        el.classList.toggle('active', parseInt(el.dataset.idx, 10) === idx);
      });
      const activeEl = listEl.querySelector('.site-item.active');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      // Open popup on the correct layer for the current view
      let marker = null;
      if (currentView === "points") marker = pointMarkerByIdx.get(idx);
      else if (currentView === "bubbles") marker = bubbleMarkerByIdx.get(idx);

      if (marker && !opts.skipMapZoom) {
        const latlng = marker.getLatLng();
        if (currentView === "heat") {
          map.flyTo(latlng, Math.max(map.getZoom(), 10), { duration: 0.8 });
        } else {
          const cluster = (currentView === "points") ? pointsCluster : bubblesCluster;
          cluster.zoomToShowLayer(marker, () => {
            marker.openPopup();
          });
          map.flyTo(latlng, Math.max(map.getZoom(), 10), { duration: 0.8 });
        }
      } else if (currentView === "heat" && !opts.skipMapZoom) {
        // In heat mode, the feature has no individual marker — just fly there
        const feature = allSites.find((f) => f._idx === idx);
        if (feature) {
          const [lng, lat] = feature.geometry.coordinates;
          map.flyTo([lat, lng], Math.max(map.getZoom(), 10), { duration: 0.8 });
        }
      }
    }

    // ── Search input ──────────────────────────────────────────────────────
    const searchEl = document.getElementById('search');
    searchEl.addEventListener('input', () => {
      searchQuery = searchEl.value.trim().toLowerCase();
      applyFilters();
    });

    // ── Rank filter pills ─────────────────────────────────────────────────
    const rankPills = document.querySelectorAll('.rank-pill');
    rankPills.forEach((pill) => {
      pill.addEventListener('click', () => {
        const r = parseInt(pill.dataset.rank, 10);
        if (activeRankMax === r) {
          activeRankMax = Infinity;
          rankPills.forEach((p) => p.classList.remove('active'));
        } else {
          activeRankMax = r;
          rankPills.forEach((p) => {
            p.classList.toggle('active', parseInt(p.dataset.rank, 10) === r);
          });
        }
        applyFilters();
      });
    });

    // ── Radius button placeholder ─────────────────────────────────────────
    const radiusBtn = document.getElementById('radiusBtn');
    radiusBtn.addEventListener('click', () => {
      radiusBtn.classList.toggle('active');
    });

    // ── View toggle ───────────────────────────────────────────────────────
    document.querySelectorAll('.view-pill').forEach((b) => {
      b.addEventListener('click', () => setView(b.dataset.view));
    });

    // ── Load GeoJSON and build markers ────────────────────────────────────
    fetch('data/maya_sites.geojson')
      .then(response => {
        if (!response.ok) throw new Error(`Failed to load GeoJSON: ${response.status}`);
        return response.json();
      })
      .then(geojson => {
        const features = geojson.features.slice();
        features.sort((a, b) => {
          const an = (a.properties && a.properties.name) || '';
          const bn = (b.properties && b.properties.name) || '';
          return an.localeCompare(bn, 'en', { sensitivity: 'base' });
        });
        allSites = features.map((f, i) => { f._idx = i; return f; });

        // Build both marker sets (points and bubbles) once
        const pointMarkers = [];
        const bubbleMarkers = [];
        allSites.forEach((feature) => {
          pointMarkers.push(makePointMarker(feature, feature._idx));
          bubbleMarkers.push(makeBubbleMarker(feature, feature._idx));
        });
        pointsCluster.addLayers(pointMarkers);
        bubblesCluster.addLayers(bubbleMarkers);

        currentFiltered = allSites.slice();

        // Start in Points mode
        map.addLayer(pointsCluster);

        renderList();
        updateCountLabel();

        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.style.transition = 'opacity 0.3s ease';
          loading.style.opacity = '0';
          setTimeout(() => loading.remove(), 300);
        }
      })
      .catch(error => {
        console.error('Error loading Maya sites:', error);
        const loading = document.getElementById('loadingIndicator');
        if (loading) {
          loading.textContent = 'Error loading site data. Please try refreshing.';
          loading.style.background = '#fce4e4';
          loading.style.color = '#c0392b';
        }
      });
  </script>
</body>
</html>
